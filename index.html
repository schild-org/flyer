<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schild Org. Flyer</title>
    
    <meta property="og:title" content="Schild Org. Flyer">
    <meta property="og:image" content="https://schild-org.github.io/flyer/flyer.png">
    <meta property="og:url" content="https://schild-org.github.io/flyer/">

    <style>
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; /* Dark background looks better with no padding */
            overflow: hidden; /* Prevents accidental scrolling */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The Image: No padding, full width */
        .flyer-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; /* Ensures the whole flyer is visible without cropping */
        }

        /* Container for the fixed buttons at the bottom right */
        .button-group {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .btn { 
            padding: 14px 20px; 
            font-size: 15px; 
            font-weight: bold;
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        /* Main Share Button */
        #shareBtn { background-color: #007bff; }

        /* Instagram Story Button */
        #instaBtn { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
        }

        .btn:active { transform: scale(0.95); opacity: 0.9; }
    </style>
</head>
<body>

    <img src="flyer.png" alt="Schild Org. Flyer" class="flyer-img">

    <div class="button-group">
        <a href="instagram://story-camera" id="instaBtn" class="btn">Add to Story</a>
        
        <button id="shareBtn" class="btn">Share Link</button>
    </div>

    <script>
        // General Share Logic
        const shareBtn = document.getElementById('shareBtn');
        shareBtn.addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Schild Org. Flyer',
                        url: window.location.href 
                    });
                } catch (err) { console.log('Error:', err); }
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied!");
            }
        });

        // Instagram Logic
        const instaBtn = document.getElementById('instaBtn');
        instaBtn.addEventListener('click', (e) => {
            // If on desktop or app not installed, fallback to Instagram web
            setTimeout(() => {
                window.location.href = "https://www.instagram.com/";
            }, 500);
        });
    </script>
</body>
</html>
