<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schild Org. Flyer</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        img { max-width: 90%; height: auto; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { margin-top: 20px; padding: 12px 24px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <img src="flyer.png" alt="Schild Org. Flyer">

    <button id="shareButton">Share</button>

    <script>
        const shareBtn = document.getElementById('shareButton');

        shareBtn.addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Check out this image!',
                        text: 'I wanted to share this with you.',
                        url: window.location.href // Shares the link to this page
                    });
                    console.log('Shared successfully');
                } catch (err) {
                    console.log('Error sharing:', err);
                }
            } else {
                // Fallback for browsers that don't support native share
                alert("Web Share is not supported on this browser. You can copy the URL to share!");
            }
        });
    </script>
</body>
</html>
