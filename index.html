<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schild Org. Flyer</title>
    
    <meta property="og:title" content="Schild Org. Flyer">
    <meta property="og:image" content="https://schild-org.github.io/flyer/flyer.png">
    <meta property="og:url" content="https://schild-org.github.io/flyer/">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Full screen image, no padding */
        .flyer-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }

        /* Transparent Glass Button */
        #shareBtn { 
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Transparent glass effect */
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%; 
            cursor: pointer; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            z-index: 100;
            transition: all 0.2s ease;
        }

        /* Icon styling */
        #shareBtn svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        #shareBtn:active { 
            transform: scale(0.9); 
            background: rgba(255, 255, 255, 0.4); 
        }
    </style>
</head>
<body>

    <img src="flyer.png" alt="Schild Org. Flyer" class="flyer-img">

    <button id="shareBtn" aria-label="Share">
        <svg viewBox="0 0 24 24">
            <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92zM18 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM6 13c-.55 0-1-.45-1-1s.45-1-1-1 1 .45 1 1-.45 1-1 1zm12 7.02c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/>
        </svg>
    </button>

    <script>
        const shareBtn = document.getElementById('shareBtn');

        shareBtn.addEventListener('click', async () => {
            const shareData = {
                title: 'Schild Org. Flyer',
                url: window.location.href 
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    console.log('Share error:', err);
                }
            } else {
                // Fallback for non-mobile browsers
                await navigator.clipboard.writeText(window.location.href);
                alert("Link copied to clipboard!");
            }
        });
    </script>
</body>
</html>
